server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /auth/ {
        proxy_pass http://backend:8000/auth/;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
    }
}

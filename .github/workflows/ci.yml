name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend2/requirements.txt
          pip install flake8 pytest
      - name: Lint with flake8
        run: |
          flake8 backend2
      - name: Run tests
        run: |
          pytest backend2/tests

  build-docker-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hoadongduong-backend:latest ./backend2
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hoadongduong-backend:latest
      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hoadongduong-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hoadongduong-frontend:latest
      - name: Build and push mlflow image
        run: |
          docker pull mlflow:2.11.1
          docker tag mlflow:2.11.1 ${{ secrets.DOCKERHUB_USERNAME }}/mlflow:2.11.1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlflow:2.11.1

  mlflow-artifact-upload:
    needs: build-docker-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload FAISS index to MLflow
        run: |
          # Assuming the index files are generated locally before CI runs
          # Copy them to the artifact storage path
          mkdir -p mlflow_data
          cp backend2/faiss_index/*.bin mlflow_data/ || true
          cp backend2/faiss_index/*.npy mlflow_data/ || true
